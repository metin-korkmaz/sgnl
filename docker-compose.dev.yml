services:
  sgnl-api:
    build: .
    container_name: sgnl-api-dev
    restart: "always"
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    environment:
      - PYTHONUNBUFFERED=1
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - N8N_WEBHOOK_URL=${N8N_WEBHOOK_URL}
      - N8N_FAST_SEARCH_URL=${N8N_FAST_SEARCH_URL}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
      - RATE_LIMIT=${RATE_LIMIT:-100}
      - RATE_WINDOW_SECONDS=${RATE_WINDOW_SECONDS:-60}
      - HOST=${HOST:-0.0.0.0}
      - PORT=${PORT:-8000}
      - LOG_LEVEL=DEBUG
      - DENSITY_THRESHOLD=${DENSITY_THRESHOLD:-0.45}
      - LLM_MAX_CHARS=${LLM_MAX_CHARS:-12000}
      # nginx-proxy configuration
      - VIRTUAL_HOST=${VIRTUAL_HOST:-your-domain.com}
      - VIRTUAL_PORT=${PORT:-8000}
      - LETSENCRYPT_HOST=${LETSENCRYPT_HOST:-your-domain.com}
      - LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL:-admin@your-domain.com}
      - REDIS_URL=${REDIS_URL:-redis://:changeme@redis:6379/0}
      - CACHE_TTL_FAST_SEARCH=${CACHE_TTL_FAST_SEARCH:-3600}
      - CACHE_TTL_SCAN_TOPIC=${CACHE_TTL_SCAN_TOPIC:-3600}
      - CACHE_MAX_SIZE=${CACHE_MAX_SIZE:-1000}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - sgnl-net
      - nginx-proxy_default

  redis:
    image: redis:7-alpine
    container_name: sgnl-redis-dev
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes --requirepass ${REDIS_PASSWORD:-changeme}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - sgnl-net

volumes:
  redis_data:

networks:
  sgnl-net:
    driver: bridge
  nginx-proxy_default:
    external: true
