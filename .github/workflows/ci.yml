name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt
          pip install ruff mypy pytest pytest-asyncio pytest-mock httpx

      - name: Lint with Ruff
        run: |
          ruff check app/ --output-format=github
          ruff format app/ --check

      - name: Type check with mypy
        run: |
          mypy app/ --ignore-missing-imports --no-error-summary

      - name: Test with pytest
        run: |
          PYTHONPATH=app pytest app/tests/ -v --cov=app --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t sgnl-api .

      - name: Test Docker image
        run: |
          docker run -d -p 8000:8000 --name sgnl-test sgnl-api
          sleep 5
          docker exec sgnl-test whoami | grep -q "appuser" && echo "✓ Runs as non-root user"
          curl -f http://localhost:8000/health || exit 1
          docker stop sgnl-test
